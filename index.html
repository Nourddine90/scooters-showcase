<script>
    let products = [];

    // تحميل المنتجات من ملف JSON الخارجي
    async function loadProducts() {
        try {
            const response = await fetch('products.json');
            if (!response.ok) throw new Error('خطأ في تحميل المنتجات');
            products = await response.json();
            renderProducts();
        } catch (error) {
            console.error(error);
            document.getElementById('productsGrid').innerHTML = '<div style="text-align:center;">عذراً، حدث خطأ في تحميل المنتجات. حاول مرة أخرى لاحقاً.</div>';
        }
    }

    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        if (!grid) return;
        if (products.length === 0) {
            grid.innerHTML = '<div style="text-align:center;">لا توجد سكوترات متاحة حالياً. تواصل معنا لإضافة منتجك.</div>';
            return;
        }
        grid.innerHTML = '';
        products.forEach(prod => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = () => showModal(prod);
            card.innerHTML = `
                <img class="product-img" src="${prod.image}" alt="${prod.name}" onerror="this.src='https://placehold.co/600x400?text=صورة+غير+متوفرة'">
                <div class="product-info">
                    <div class="product-title">${prod.name}</div>
                    <div class="product-price">${prod.price} درهم</div>
                    <div class="product-location">📍 ${prod.sellerLocation}</div>
                    <div>
                        <button class="btn-details">تفاصيل أكثر</button>
                        <a href="https://wa.me/${prod.sellerPhone}" target="_blank" class="btn-wa" onclick="event.stopPropagation()">💬 واتساب</a>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // بقية الدوال (showModal, closeModal) كما هي...

    function showModal(prod) {
        const modal = document.getElementById('productModal');
        document.getElementById('modalImg').src = prod.image;
        document.getElementById('modalTitle').innerText = prod.name;
        document.getElementById('modalPrice').innerHTML = prod.price + ' درهم';
        document.getElementById('modalDesc').innerText = prod.description || 'لا يوجد وصف إضافي.';
        document.getElementById('modalSellerName').innerHTML = `👤 ${prod.sellerName}`;
        document.getElementById('modalSellerLocation').innerHTML = `📍 ${prod.sellerLocation}`;
        const phone = prod.sellerPhone.replace(/\s/g, '');
        const whatsappLink = `https://wa.me/${phone}`;
        document.getElementById('whatsappLink').href = whatsappLink;
        document.getElementById('whatsappLink').innerHTML = `📱 اتصل عبر واتساب (${prod.sellerName})`;

        const videoContainer = document.getElementById('modalVideoContainer');
        if (prod.video && prod.video.trim() !== "") {
            let videoHtml = '';
            if (prod.video.includes('youtube.com') || prod.video.includes('youtu.be')) {
                let embedUrl = prod.video.replace('watch?v=', 'embed/');
                if (prod.video.includes('youtu.be')) {
                    let videoId = prod.video.split('/').pop();
                    embedUrl = `https://www.youtube.com/embed/${videoId}`;
                }
                videoHtml = `<iframe class="modal-video" width="100%" height="250" src="${embedUrl}" frameborder="0" allowfullscreen></iframe>`;
            } else {
                videoHtml = `<video class="modal-video" controls src="${prod.video}"></video>`;
            }
            videoContainer.innerHTML = videoHtml;
        } else {
            videoContainer.innerHTML = '';
        }
        modal.style.display = 'flex';
    }

    document.querySelector('.close-modal')?.addEventListener('click', () => {
        document.getElementById('productModal').style.display = 'none';
    });
    window.onclick = (e) => {
        if (e.target === document.getElementById('productModal')) {
            document.getElementById('productModal').style.display = 'none';
        }
    };

    loadProducts();
</script>
